<!DOCTYPE html>
<html>
<head>
    <title>SmartUniEvent - Direct Login Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
        }
        input, button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <h1>SmartUniEvent - Direct Login Test</h1>

    <form id="loginForm">
        <input type="email" id="email" placeholder="Email" value="admin@university.edu">
        <input type="password" id="password" placeholder="Password" value="Admin@123">
        <button type="submit">Login</button>
    </form>

    <div id="result"></div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');

            resultDiv.innerHTML = 'Attempting login...';
            resultDiv.className = '';

            try {
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify({ email, password }),
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.className = 'success';
                    resultDiv.innerHTML = `
                        <h3>✅ LOGIN SUCCESSFUL!</h3>
                        <p><strong>User:</strong> ${data.user.firstName} ${data.user.lastName}</p>
                        <p><strong>Email:</strong> ${data.user.email}</p>
                        <p><strong>Role:</strong> ${data.user.role}</p>
                        <p><strong>Token:</strong> ${data.token.substring(0, 50)}...</p>
                        <p><a href="http://localhost:5175">Go to Main App</a></p>
                    `;
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                } else {
                    throw new Error(data.message || 'Login failed');
                }
            } catch (error) {
                resultDiv.className = 'error';
                resultDiv.innerHTML = `
                    <h3>❌ LOGIN FAILED</h3>
                    <p><strong>Error:</strong> ${error.message}</p>
                    <p><strong>Type:</strong> ${error.name}</p>
                    <hr>
                    <h4>Troubleshooting:</h4>
                    <ul>
                        <li>Is backend running? <a href="http://localhost:5000/health" target="_blank">Check Health</a></li>
                        <li>Check browser console (F12) for CORS errors</li>
                        <li>Disable antivirus/firewall temporarily</li>
                        <li>Try in Incognito mode</li>
                        <li>Try different browser (Firefox, Edge)</li>
                    </ul>
                `;
            }
        });
    </script>
</body>
</html>
